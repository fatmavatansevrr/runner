name: antigravity_app
description: Antigravity — a calm adaptive running planner.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/illustrations/

  fonts:
    - family: ClashGrotesk
      fonts:
        - asset: assets/fonts/ClashGrotesk-Bold.ttf
          weight: 700
    - family: GeneralSans
      fonts:
        - asset: assets/fonts/GeneralSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeneralSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/GeneralSans-Bold.ttf
          weight: 700
